name: Safham
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  Safham:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - SafhamApp
    resources:
      - SafhamApp/Resources
    info:
      path: SafhamApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Safham
        CFBundleShortVersionString: 1.0
        CFBundleVersion: 1
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSUserNotificationUsageDescription: Safham sends optional daily reminders for your review session.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.safham.app
        TARGETED_DEVICE_FAMILY: 1,2

  SafhamTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - SafhamAppTests
    dependencies:
      - target: Safham
